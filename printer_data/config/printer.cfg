[include mainsail.cfg]
[include toolchanger/readonly-configs/toolchanger-include.cfg]
[include dock_tuner.cfg]
[include prime_lines.cfg]
[virtual_sdcard]
[exclude_object]

# This file contains common pin mappings for the LDO Voron 2.4 Rev. D kit
# See docs/Config_Reference.md for a description of parameters.

## Voron Design VORON 2.4 350mm StealthChanger

[mcu]
##  Obtain definition by "ls -l /dev/serial/by-id/" then unplug to verify
##--------------------------------------------------------------------
serial: /dev/serial/by-id/usb-Klipper_stm32h743xx_30003B000551333233393839-if00
restart_method: command
##--------------------------------------------------------------------

[printer]
kinematics: corexy
max_velocity: 300  
max_accel: 3000
max_z_velocity: 70         
max_z_accel: 750
square_corner_velocity: 5.0

#####################################################################
#   X/Y Stepper Settings
#####################################################################

##  B Stepper - Left
##  Connected to HV STEPPER 0
##  Endstop connected to X-ENDSTOP
[stepper_x]
step_pin: PB10
dir_pin: !PB11
enable_pin: !PG0
rotation_distance: 40
microsteps: 16
full_steps_per_rotation:400  #set to 200 for 1.8 degree stepper
endstop_pin: PC1
position_min: 0
##--------------------------------------------------------------------

##  Uncomment for 350mm build
position_endstop: 350
position_max: 350

##--------------------------------------------------------------------
homing_speed: 25   #Max 100
homing_retract_dist: 5
homing_positive_dir: true

##  Make sure to update below for your relevant driver (2209 or 5160)
[tmc5160 stepper_x]
cs_pin: PE15
spi_bus: spi4
#diag0_pin: ^!PG1
interpolate: true
run_current: 1.2
sense_resistor: 0.075
stealthchop_threshold: 100

[autotune_tmc stepper_x]
motor: ldo-42sth48-2004mah
tuning_goal: autoswitch
voltage: 24

##  A Stepper - Right
##  Connected to HV STEPPER 1
##  Endstop connected to Y-ENDSTOP
[stepper_y]
step_pin: PF15
dir_pin: !PF14
enable_pin: !PE9
rotation_distance: 40
microsteps: 16
full_steps_per_rotation:400  #set to 200 for 1.8 degree stepper
endstop_pin: PC2
position_min: 0
##--------------------------------------------------------------------

##  Uncomment for 350mm build
position_endstop: 350
position_min: -7
position_max: 350

##--------------------------------------------------------------------
homing_speed: 25  #Max 100
homing_retract_dist: 5
homing_positive_dir: true

##  Make sure to update below for your relevant driver (2209 or 5160)
[tmc5160 stepper_y]
cs_pin: PE11
spi_bus: spi4
#diag0_pin: ^!PE10
interpolate: true
run_current: 1.2
sense_resistor: 0.075
stealthchop_threshold: 100

[autotune_tmc stepper_y]
motor: ldo-42sth48-2004mah
tuning_goal: autoswitch
voltage: 24
 
#####################################################################
#   Z Stepper Settings
#####################################################################

## Z0 Stepper - Front Left
##  Connected to STEPPER 0
##  Endstop connected to Z-ENDSTOP
[stepper_z]
step_pin: PD4
dir_pin: !PD3
enable_pin: !PD7
rotation_distance: 40
gear_ratio: 80:16  
microsteps: 16
full_steps_per_rotation: 200
endstop_pin: probe:z_virtual_endstop
##  Z-position of nozzle (in mm) to z-endstop trigger point relative to print surface (Z0)
##  (+) value = endstop above Z0, (-) value = endstop below
##  Increasing position_endstop brings nozzle closer to the bed
##  After you run Z_ENDSTOP_CALIBRATE, position_endstop will be stored at the very end of your config
#position_endstop: -0.5
##--------------------------------------------------------------------

##  Uncomment below for 350mm build
position_max: 330

##--------------------------------------------------------------------
position_min: -5
homing_speed: 8
second_homing_speed: 3
homing_retract_dist: 3

##  Make sure to update below for your relevant driver (2209 or 5160)
[tmc2209 stepper_z]
uart_pin: PD5
#diag_pin: ^!PD6
interpolate: true
run_current: 1.4
hold_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 0

[autotune_tmc stepper_z]
motor: ldo-42sth48-2004ac
tuning_goal: autoswitch
voltage: 24

##  Z1 Stepper - Rear Left
##  Connected to STEPPER 1
[stepper_z1]
step_pin: PC12
dir_pin: PC11
enable_pin: !PD2
rotation_distance: 40
gear_ratio: 80:16 
microsteps: 16
full_steps_per_rotation: 200

##  Make sure to update below for your relevant driver (2209 or 5160)
[tmc2209 stepper_z1]
uart_pin: PD0
#diag_pin: ^!PD1
interpolate: true
run_current: 1.4
hold_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 0

[autotune_tmc stepper_z1]
motor: ldo-42sth48-2004ac
tuning_goal: autoswitch
voltage: 24

##  Z2 Stepper - Rear Right
##  Connected to STEPPER 2
[stepper_z2]
step_pin: PC9
dir_pin: !PC8
enable_pin: !PC10
rotation_distance: 40
gear_ratio: 80:16 
microsteps: 16
full_steps_per_rotation: 200

##  Make sure to update below for your relevant driver (2209 or 5160)
[tmc2209 stepper_z2]
uart_pin: PA8
#diag_pin: ^!PA15
interpolate: true
run_current: 1.4
hold_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 0

[autotune_tmc stepper_z2]
motor: ldo-42sth48-2004ac
tuning_goal: autoswitch
voltage: 24

##  Z3 Stepper - Front Right
##  Connected to STEPPER 3
[stepper_z3]
step_pin: PG7
dir_pin: PG6
enable_pin: !PC7
rotation_distance: 40
gear_ratio: 80:16 
microsteps: 16
full_steps_per_rotation: 200

##  Make sure to update below for your relevant driver (2209 or 5160)
[tmc2209 stepper_z3]
uart_pin: PG8
#diag_pin: ^!PC6
interpolate: true
run_current: 1.4
hold_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 0

[autotune_tmc stepper_z3]
motor: ldo-42sth48-2004ac
tuning_goal: autoswitch
voltage: 24

#####################################################################
#   Bed Heater
#####################################################################

[heater_bed]
##  SSR Pin - HEATBED
##  Thermistor - TH1
heater_pin: PG11
sensor_type: ATC Semitec 104NT-4-R025H42G
sensor_pin: PA1
pullup_resistor: 2200
##  Adjust Max Power so your heater doesn't warp your bed. Rule of thumb is 0.4 watts / cm^2 .
max_power: 0.6
min_temp: 0
max_temp: 120
control: pid
pid_kp: 40.790
pid_ki: 2.124
pid_kd: 195.793

#####################################################################
#   Probe
#####################################################################

#[probe]
##  Inductive Probe
##  Connected to Z-PROBE
##  This probe is not used for Z height, only Quad Gantry Leveling
#pin: ^nhk:gpio10
#z_offset: 0
#speed: 8
#samples: 3
#samples_result: median
#sample_retract_dist: 2
#lift_speed: 5
#samples_tolerance: 0.006
#samples_tolerance_retries: 3

#####################################################################
#   Fan Control
#####################################################################

[controller_fan controller_fan]
##  Controller fan - FAN2
pin: PB7
##tachometer_pin: PF6
kick_start_time: 0.5
heater: heater_bed

[heater_fan exhaust_fan]
##  Exhaust fan - FAN3
pin: PF9
#tachometer_pin: PF8
max_power: 1.0
shutdown_speed: 0.0
kick_start_time: 5.0
heater: heater_bed
heater_temp: 60
fan_speed: 1.0

#####################################################################
#   LED Control
#####################################################################

## Chamber Lighting (Optional)
## Connected to LED-STRIP
#[output_pin caselight]
#pin: PE6
#pwm:true
#hardware_pwm: False
#value: 0.20 #startup value
#shutdown_value: 0
#value:1
#cycle_time: 0.00025

#####################################################################
#   Accelerometer
#####################################################################

[resonance_tester]
accel_chip: adxl345 T0
accel_per_hz: 100
sweeping_accel: 400
sweeping_period: 0
##--------------------------------------------------------------------

## Uncomment below for 350mm build
probe_points:
    175, 175, 20

##--------------------------------------------------------------------

#####################################################################
#   TH
# #####################################################################

[thermistor CMFB103F3950FANT]
temperature1: 0.0
resistance1: 32116.0
temperature2: 40.0
resistance2: 5309.0
temperature3: 80.0
resistance3: 1228.0

#####################################################################
#   Gantry Adjustment Routines
#####################################################################

[idle_timeout]
timeout: 1800

[quad_gantry_level]
gantry_corners:
   -60,-10
   410,420

points:
   60,60
   60,290
   290,290
   290,60

speed: 300
horizontal_move_z: 15
retries: 5
retry_tolerance: 0.01
max_adjust: 10

[gcode_macro QUAD_GANTRY_LEVEL]
rename_existing: _QUAD_GANTRY_LEVEL
gcode:
    # Auf Werkzeug 0 wechseln
    T0
    # Ursprünglichen Quad-Gantry-Level-Befehl ausführen
    _QUAD_GANTRY_LEVEL



##--------------------------------------------------------------------

#####################################################################
#   Cartographer
#####################################################################

#[cartographer]
#mcu: cartographer
#x_offset: 47 # This is the offset of your probe from the nozzle tip, to the centre of the coil.
#y_offset: 0 # This is the offset of your probe from the nozzle tip, to the centre of the coil.
#verbose: no # For extra output

#[bed_mesh]
#zero_reference_position: 175, 175 # The centre of your bed. 
#speed: 300
#horizontal_move_z: 3
#mesh_min: 25, 25 # The first probed coordinate, nearest to the origin. This coordinate is relative to the probe's location.
#mesh_max: 325, 325 # The probed coordinate farthest from the origin. This is not necessarily the last point probed, as the probing process occurs in a zig-zag fashion. As with mesh_min, this coordinate is relative to the probe's location.
#probe_count: 20, 20
#adaptive_margin: 10
#mesh_pps: 0,0 # Disable interpolation - mesh is probably dense enough

#[temperature_sensor cartographer]
#sensor_type: temperature_mcu
#sensor_mcu: cartographer
#min_temp: 5
#max_temp: 105

#[adxl345]
# Select 1 of the cs_pin below depending on the probe you have. 
# Having the wrong one selected will cause an Endless Bootloop
# Cartographer V4 has int2 connected to the probes PA1 pin
#cs_pin: cartographer:PA0 # For Cartographer V4
#spi_bus: spi1

#[resonance_tester]
#accel_chip: adxl345
#probe_points:
#    175, 175, 20 # Fill out the blank with x and y coordinates where you want to run the resonance test.

#####################################################################
#   Bed Mesh
#####################################################################

[bed_mesh]
speed: 200
horizontal_move_z: 5

mesh_min: 25, 40
mesh_max: 325, 335

probe_count: 5,5

adaptive_margin: 10
fade_start: 1
fade_end: 10

algorithm: bicubic

#####################################################################
#   Macros
#####################################################################

[gcode_macro UNLOAD_FILAMENT]
description: Toolchanger safe filament unload (default 230C)

gcode:
  {% set DEFAULT_TEMP = 230 %}
  {% set tool = printer.toolchanger.tool_number %}
  {% set extruder = "extruder" ~ (tool if tool > 0 else "") %}
  {% set TEMP = params.TEMP|default(DEFAULT_TEMP)|int %}

  M117 Unloading filament on T{tool}...

  # Sicherer Bewegungsmodus
  G90

  # Tool sicher aktivieren
  T{tool}

  # Düse hoch
  G1 Z80 F6000
  G1 X175 Y50 F6000

  # Auf Temperatur bringen
  M109 T{tool} S{TEMP}

  # Relativmodus
  M83
  G92 E0

  # Tip formen
  G1 E5 F300

  # Schneller Rückzug
  G1 E-30 F3000
  G1 E-30 F3000
  G1 E-20 F2000

  M400

  # Zurück zu absolut
  M82

  M117 Unload Complete T{tool}

[gcode_macro LOAD_FILAMENT]
description: Toolchanger safe filament load (default 230C)

gcode:
  {% set DEFAULT_TEMP = 230 %}
  {% set tool = printer.toolchanger.tool_number %}
  {% set extruder = "extruder" ~ (tool if tool > 0 else "") %}
  {% set TEMP = params.TEMP|default(DEFAULT_TEMP)|int %}

  M117 Loading filament on T{tool}...

  # Sicherer Modus
  G90

  # Düse hoch
  G1 Z80 F6000
  G1 X175 Y50 F6000

  # Sicherstellen dass richtiges Tool aktiv ist
  T{tool}

  # Aufheizen (blockierend)
  M109 T{tool} S{TEMP}

  # Relative Extrusion
  M83
  G92 E0

  # Laden
  G1 E50 F300
  G1 E40 F300

  M400

  # kleiner Rückzug
  G1 E-2 F1800

  # zurück zu absolut
  M82

  M117 Load Complete T{tool}

[gcode_macro Versat]
gcode:
  M109 T{T0} S145
  G28
  CALIBRATE_ALL_OFFSETS
  

#####################################################################
#   Print Start End Macros
#####################################################################

[gcode_macro PRINT_START]
gcode:
  # Parameter einlesen
  {% set BED_TEMP = params.BED_TEMP | default(60) | int %}
  {% set INITIAL_TOOL = params.TOOL | default(0) | int %}

  # Ggf. Crash‑Detection deaktivieren
  {% if printer.tool_probe_endstop is defined %}
    M117 Disabling crash detection
    STOP_CRASH_DETECTION
  {% endif %}

  ################################
  # Bett vorheizen
  ################################
  M117 Heating Bed
  M190 S{BED_TEMP}
  CHECK_CANCEL                        # Abbruchprüfung nach Bett-Temperatur

  ################################
  # Homen
  ################################
  G28 
  CHECK_CANCEL

  ################################
  # Düse für QGL vorheizen
  ################################
  M117 Heating nozzle for QGL
  M109 T0 S145                         # Auf 145°C aufheizen und warten
  CHECK_CANCEL

  ################################
  # Gantry nivellieren (falls nötig)
  ################################
  {% if printer.quad_gantry_level.applied == False %}
    M117 Running QGL
    QUAD_GANTRY_LEVEL
    G28 Z
    CHECK_CANCEL
  {% else %}
    M117 QGL already applied
  {% endif %}

  ################################
  # Bettmeshing (adaptiv)
  ################################
  M117 Bed Mesh
  BED_MESH_CALIBRATE ADAPTIVE=1
  CHECK_CANCEL

  ################################
  # Alle benötigten Werkzeuge **sequenziell** voll aufheizen (M109)
  # Beginnend mit der kleinsten Toolnummer, dann der Reihe nach.
  # Nur Werkzeuge mit übergebenem Temperatur-Parameter werden beheizt.
  ################################
  {% for tool_nr in printer.toolchanger.tool_numbers | sort %}
    {% set param_name = 'T' ~ tool_nr|string ~ '_TEMP' %}
    {% if param_name in params %}
      M117 Heating T{tool_nr} to {params[param_name]}°C
      M109 T{tool_nr} S{params[param_name]}
      CHECK_CANCEL
    {% endif %}
  {% endfor %}

  ################################
  # Jetzt auf Zieltemperatur **des aktiven Werkzeugs** warten
  ################################
  {% set initial_temp = 'T' ~ INITIAL_TOOL|string ~ '_TEMP' %}
  {% if initial_temp in params %}
    M117 Waiting for T{INITIAL_TOOL} to reach {params[initial_temp]}°C
    M109 S{params[initial_temp]}
    CHECK_CANCEL
  {% endif %}

  ################################
  # Alle vorgeheizten Werkzeuge primen
  ################################
  M117 Priming all tools
  PRIME_LINES INITIAL_TOOL={INITIAL_TOOL}

  ################################
  # Crash‑Detection ggf. wieder aktivieren
  ################################
  {% if printer.tool_probe_endstop is defined %}
    M117 Re-enabling crash detection
    START_CRASH_DETECTION
  {% endif %}

[gcode_macro PRINT_END]
gcode:
  {% set th = printer.toolhead %}

  {% set x_safe = th.position.x + 20 * (1 if th.axis_maximum.x - th.position.x > 20 else -1) %}
  {% set y_safe = th.position.y + 20 * (1 if th.axis_maximum.y - th.position.y > 20 else -1) %}
  {% set z_safe = [th.position.z + 10, th.axis_maximum.z]|min %}

  M400

  ################################
  # Reset speed overrides
  ################################
  M220 S100
  M221 S100

  ################################
  # Disable pressure advance
  ################################
  SET_PRESSURE_ADVANCE ADVANCE=0

  ################################
  # Retract active tool
  ################################
  G92 E0
  G1 E-3 F3600

  ################################
  # Lift Z first (safety)
  ################################
  G91
  G1 Z10 F3000
  G90

  ################################
  # Move away from print
  ################################
  G0 X{x_safe} Y{y_safe} F20000

  ################################
  # Park printer
  ################################
  G0 X{th.axis_maximum.x//2} Y{th.axis_maximum.y - 5} F12000

  ################################
  # Reset offsets
  ################################
  SET_GCODE_OFFSET X=0 Y=0 Z=0

  ################################
  # Turn off all tools
  ################################
  {% for tn in printer.toolchanger.tool_numbers %}
      M104 S0 T{tn}
      M107 T{tn}
      SET_STEPPER_ENABLE STEPPER=extruder{tn if tn > 0 else ''} ENABLE=0
  {% endfor %}

  ################################
  # Turn off bed
  ################################
  M140 S0

  ################################
  # Disable part cooling
  ################################
  M107

  ################################
  # Disable motors after move
  ################################
  M84

#####################################################################
#   Backup
#####################################################################

[gcode_macro update_git]
gcode:
    {% set message = params.MESSAGE|default() %}
    {% if message %}
        RUN_SHELL_COMMAND CMD=update_git_script_message PARAMS="'{params.MESSAGE}'"
    {% else %}
        RUN_SHELL_COMMAND CMD=update_git_script
    {% endif %}

[gcode_shell_command update_git_script]
command: bash -c "bash $HOME/klipper-backup/script.sh"
timeout: 90.0
verbose: True

[gcode_shell_command update_git_script_message]
command: bash -c "bash $HOME/klipper-backup/script.sh -c \"$0\""
timeout: 90.0
verbose: True

